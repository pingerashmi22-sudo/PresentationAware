<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>PresentationAware</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header h3 {
      color: #FFD700;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .info {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.8;
    }

    .info strong {
      color: #FFD700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 6px;
    }

    .step-num {
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 12px;
      color: #ccc;
    }

    .toolbar-preview {
      margin-top: 12px;
      background: rgba(30, 30, 30, 0.92);
      border-radius: 20px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .toolbar-preview span {
      font-size: 14px;
    }

    .toolbar-preview .lbl {
      font-size: 9px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="header">
    <span style="font-size: 20px;">🎤</span>
    <h3>PresentationAware</h3>
  </div>
  <div class="info">
    <strong>How to use</strong>
    <div class="step">
      <span class="step-num">1</span>
      <span class="step-text">Open your Google Slides presentation</span>
    </div>
    <div class="step">
      <span class="step-num">2</span>
      <span class="step-text">Look for the toolbar at the bottom</span>
    </div>
    <div class="step">
      <span class="step-num">3</span>
      <span class="step-text">Click 🎙️ to enable microphone</span>
    </div>
    <div class="step">
      <span class="step-num">4</span>
      <span class="step-text">Click ▶️ to start — keywords highlight on slides!</span>
    </div>
  </div>

  <div class="toolbar-preview">
    <span>🎙️</span>
    <span style="color:#555;">|</span>
    <span>▶️</span>
    <span>⏹️</span>
    <span style="color:#555;">|</span>
    <span class="lbl">Ready</span>
    <span style="color:#555;">|</span>
    <span style="font-size:10px;color:#666;">✕</span>
  </div>
</body>

</html>
